name: Auto Data Import

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger with options
    inputs:
      force_full_import:
        description: 'Force full import (ignore interval check)'
        required: false
        default: 'true'
        type: boolean

jobs:
  scheduled-import:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours for large imports
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate
        working-directory: packages/database

      - name: Run Smart Scheduler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ "${{ github.event.inputs.force_full_import }}" == "true" ]; then
            pnpm --filter @mpt/scraper run scheduler:force
          else
            pnpm --filter @mpt/scraper run scheduler
          fi

